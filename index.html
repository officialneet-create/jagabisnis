<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JagaBisnis — Multi-Bisnis POS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #1A56DB;
    --brand-dark: #1043b5;
    --brand-light: #EBF2FF;
    --accent: #F59E0B;
    --accent2: #10B981;
    --danger: #EF4444;
    --text: #0F172A;
    --text2: #475569;
    --text3: #94A3B8;
    --border: #E2E8F0;
    --surface: #F8FAFC;
    --white: #FFFFFF;
    --sidebar-w: 240px;
    --header-h: 60px;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
    --shadow-md: 0 4px 16px rgba(0,0,0,.1);
    --transition: all .2s ease;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--surface); color:var(--text); font-size:14px; }

  /* ========== SPLASH / LOGIN ========== */
  #splash {
    position:fixed; inset:0; z-index:9999;
    background: linear-gradient(135deg, #0F172A 0%, #1A3A6E 60%, #1A56DB 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition: opacity .5s ease, transform .5s ease;
  }
  #splash.out { opacity:0; pointer-events:none; transform:scale(1.04); }

  .splash-logo { display:flex; align-items:center; gap:12px; margin-bottom:48px; }
  .splash-logo img { height:48px; filter:brightness(10); }
  .splash-logo span { color:#fff; font-size:26px; font-weight:800; letter-spacing:-.5px; }

  .login-card {
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:40px 36px;
    width:380px;
    box-shadow:0 24px 64px rgba(0,0,0,.4);
  }
  .login-card h2 { color:#fff; font-size:22px; font-weight:700; margin-bottom:4px; }
  .login-card p { color:rgba(255,255,255,.55); font-size:13px; margin-bottom:28px; }

  .form-group { margin-bottom:16px; }
  .form-group label { display:block; color:rgba(255,255,255,.7); font-size:12px; font-weight:600; margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
  .form-group input, .form-group select {
    width:100%; padding:11px 14px;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.15);
    border-radius:var(--radius-sm);
    color:#fff; font-family:inherit; font-size:14px;
    transition:var(--transition);
    outline:none;
  }
  .form-group input::placeholder { color:rgba(255,255,255,.35); }
  .form-group input:focus, .form-group select:focus {
    border-color:rgba(255,255,255,.4);
    background:rgba(255,255,255,.15);
  }
  .form-group select option { background:#1A3A6E; color:#fff; }

  .demo-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .pill {
    padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600;
    cursor:pointer; border:1px solid rgba(255,255,255,.2);
    color:rgba(255,255,255,.7); transition:var(--transition);
    background:rgba(255,255,255,.07);
  }
  .pill:hover { background:rgba(255,255,255,.18); color:#fff; }
  .pill.sa { border-color:#F59E0B; color:#F59E0B; }
  .pill.sa:hover { background:rgba(245,158,11,.2); }
  .pill.admin { border-color:#10B981; color:#10B981; }
  .pill.admin:hover { background:rgba(16,185,129,.2); }
  .pill.kasir { border-color:#60A5FA; color:#60A5FA; }
  .pill.kasir:hover { background:rgba(96,165,250,.2); }

  .btn-login {
    width:100%; padding:13px; border:none; border-radius:var(--radius-sm);
    background: linear-gradient(135deg, var(--brand), #3B82F6);
    color:#fff; font-family:inherit; font-size:15px; font-weight:700;
    cursor:pointer; transition:var(--transition);
    box-shadow:0 4px 16px rgba(26,86,219,.4);
  }
  .btn-login:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(26,86,219,.5); }
  .btn-login:active { transform:translateY(0); }

  /* ========== APP SHELL ========== */
  #app { display:none; height:100vh; overflow:hidden; }
  #app.visible { display:flex; }

  /* ========== SIDEBAR ========== */
  .sidebar {
    width:var(--sidebar-w); height:100vh;
    background:#0F172A; display:flex; flex-direction:column;
    flex-shrink:0; overflow-y:auto; overflow-x:hidden;
  }
  .sidebar-brand {
    padding:18px 20px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid rgba(255,255,255,.06); flex-shrink:0;
  }
  .sidebar-brand img { height:30px; filter:brightness(10); }
  .sidebar-brand span { color:#fff; font-size:16px; font-weight:800; }

  .sidebar-role {
    margin:12px 16px;
    padding:8px 12px;
    border-radius:var(--radius-sm);
    font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
  }
  .role-sa { background:rgba(245,158,11,.15); color:#F59E0B; border:1px solid rgba(245,158,11,.25); }
  .role-admin { background:rgba(16,185,129,.15); color:#10B981; border:1px solid rgba(16,185,129,.25); }
  .role-kasir { background:rgba(96,165,250,.15); color:#60A5FA; border:1px solid rgba(96,165,250,.25); }

  .sidebar-section {
    padding:8px 0 4px;
  }
  .sidebar-section-title {
    padding:6px 20px; font-size:10px; font-weight:700;
    color:rgba(255,255,255,.3); text-transform:uppercase; letter-spacing:.8px;
  }
  .nav-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 20px; cursor:pointer; border-radius:0;
    color:rgba(255,255,255,.5); font-size:13px; font-weight:500;
    transition:var(--transition); position:relative;
    margin:1px 8px; border-radius:var(--radius-sm);
  }
  .nav-item:hover { color:#fff; background:rgba(255,255,255,.07); }
  .nav-item.active { color:#fff; background:rgba(26,86,219,.4); }
  .nav-item.active::before {
    content:''; position:absolute; left:0; top:50%; transform:translateY(-50%);
    width:3px; height:60%; background:var(--brand); border-radius:0 3px 3px 0;
  }
  .nav-icon { font-size:16px; width:20px; text-align:center; }
  .nav-badge {
    margin-left:auto; background:var(--danger); color:#fff;
    font-size:10px; font-weight:700; padding:2px 6px; border-radius:10px;
  }

  .sidebar-footer {
    margin-top:auto; padding:16px; border-top:1px solid rgba(255,255,255,.06);
  }
  .user-info { display:flex; align-items:center; gap:10px; }
  .avatar {
    width:34px; height:34px; border-radius:50%;
    background:linear-gradient(135deg, var(--brand), #3B82F6);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:13px; font-weight:700; flex-shrink:0;
  }
  .user-name { font-size:13px; font-weight:600; color:#fff; }
  .user-email { font-size:11px; color:rgba(255,255,255,.4); margin-top:1px; }
  .btn-logout {
    margin-left:auto; padding:6px 10px; background:rgba(239,68,68,.15);
    border:1px solid rgba(239,68,68,.25); color:#EF4444;
    border-radius:var(--radius-sm); font-size:11px; font-weight:600;
    cursor:pointer; transition:var(--transition); font-family:inherit;
  }
  .btn-logout:hover { background:rgba(239,68,68,.25); }

  /* ========== MAIN ========== */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  .topbar {
    height:var(--header-h); padding:0 24px;
    display:flex; align-items:center; gap:16px;
    background:var(--white); border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .topbar h1 { font-size:17px; font-weight:700; color:var(--text); }
  .topbar-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
  .search-box {
    display:flex; align-items:center; gap:8px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:7px 12px;
  }
  .search-box input {
    border:none; background:transparent; font-family:inherit;
    font-size:13px; color:var(--text); outline:none; width:180px;
  }
  .search-box input::placeholder { color:var(--text3); }
  .notif-btn {
    width:34px; height:34px; border-radius:var(--radius-sm);
    background:var(--surface); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:16px; position:relative;
    transition:var(--transition);
  }
  .notif-btn:hover { background:var(--brand-light); border-color:var(--brand); }
  .notif-dot {
    position:absolute; top:6px; right:6px;
    width:7px; height:7px; background:var(--danger); border-radius:50%;
    border:2px solid var(--white);
  }

  .content { flex:1; overflow-y:auto; padding:24px; }

  /* ========== VIEWS ========== */
  .view { display:none; }
  .view.active { display:block; }

  /* ========== STATS ========== */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
  .stat-card {
    background:var(--white); border:1px solid var(--border);
    border-radius:var(--radius); padding:20px; position:relative; overflow:hidden;
    transition:var(--transition);
  }
  .stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
  .stat-card::after {
    content:''; position:absolute; top:0; right:0;
    width:80px; height:80px; border-radius:50%;
    background:var(--card-color, var(--brand));
    opacity:.07; transform:translate(20px,-20px);
  }
  .stat-label { font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
  .stat-value { font-size:26px; font-weight:800; color:var(--text); font-family:'Space Grotesk',sans-serif; }
  .stat-sub { font-size:12px; color:var(--text3); margin-top:4px; }
  .stat-icon { position:absolute; top:16px; right:16px; font-size:20px; opacity:.6; }
  .stat-up { color:var(--accent2); font-weight:700; }
  .stat-down { color:var(--danger); font-weight:700; }

  /* ========== CHARTS ========== */
  .chart-row { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:24px; }
  .chart-card {
    background:var(--white); border:1px solid var(--border);
    border-radius:var(--radius); padding:20px;
  }
  .chart-card h3 { font-size:14px; font-weight:700; margin-bottom:4px; }
  .chart-card p { font-size:12px; color:var(--text3); margin-bottom:20px; }
  .bar-chart { display:flex; align-items:flex-end; gap:8px; height:120px; }
  .bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .bar {
    width:100%; border-radius:4px 4px 0 0;
    background:var(--brand); transition:height .6s ease;
    min-height:4px;
  }
  .bar-label { font-size:10px; color:var(--text3); font-weight:600; }
  .bar-val { font-size:10px; color:var(--text2); font-weight:700; }

  .donut-wrap { display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; height:120px; }
  svg.donut { width:100px; height:100px; }
  .donut-legend { display:flex; flex-direction:column; gap:6px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); }
  .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  /* ========== TABLES ========== */
  .table-card {
    background:var(--white); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden;
  }
  .table-header {
    padding:16px 20px; display:flex; align-items:center; gap:12px;
    border-bottom:1px solid var(--border);
  }
  .table-header h3 { font-size:14px; font-weight:700; }
  .table-header-right { margin-left:auto; display:flex; gap:8px; }
  table { width:100%; border-collapse:collapse; }
  th {
    padding:10px 20px; text-align:left;
    font-size:11px; font-weight:700; color:var(--text2);
    text-transform:uppercase; letter-spacing:.5px;
    background:var(--surface); border-bottom:1px solid var(--border);
  }
  td { padding:12px 20px; border-bottom:1px solid var(--border); font-size:13px; color:var(--text); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--surface); }

  /* ========== BADGES ========== */
  .badge {
    padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;
    display:inline-block;
  }
  .badge-green { background:#D1FAE5; color:#065F46; }
  .badge-blue { background:#DBEAFE; color:#1E40AF; }
  .badge-red { background:#FEE2E2; color:#991B1B; }
  .badge-yellow { background:#FEF3C7; color:#92400E; }
  .badge-gray { background:#F1F5F9; color:#475569; }

  /* ========== BUTTONS ========== */
  .btn {
    padding:8px 16px; border-radius:var(--radius-sm);
    font-family:inherit; font-size:13px; font-weight:600;
    cursor:pointer; transition:var(--transition); border:none;
    display:inline-flex; align-items:center; gap:6px;
  }
  .btn-primary { background:var(--brand); color:#fff; }
  .btn-primary:hover { background:var(--brand-dark); }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text2); }
  .btn-outline:hover { border-color:var(--brand); color:var(--brand); }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-danger:hover { background:#DC2626; }
  .btn-success { background:var(--accent2); color:#fff; }
  .btn-success:hover { background:#059669; }
  .btn-sm { padding:5px 10px; font-size:12px; }
  .btn-icon { padding:7px; }

  /* ========== PRODUCT GRID (backoffice) ========== */
  .product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-top:16px; }
  .product-card {
    background:var(--white); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden;
    transition:var(--transition); cursor:pointer;
  }
  .product-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
  .product-img {
    height:100px; display:flex; align-items:center; justify-content:center;
    font-size:40px; background:var(--surface);
  }
  .product-info { padding:12px; }
  .product-name { font-size:13px; font-weight:700; margin-bottom:4px; }
  .product-price { font-size:14px; font-weight:800; color:var(--brand); font-family:'Space Grotesk',sans-serif; }
  .product-stock { font-size:11px; color:var(--text3); margin-top:3px; }
  .product-actions { display:flex; gap:6px; margin-top:10px; }

  /* ========== POS (Front Office) ========== */
  .pos-layout { display:grid; grid-template-columns:1fr 340px; gap:0; height:calc(100vh - var(--header-h)); overflow:hidden; }
  .pos-products {
    padding:20px; overflow-y:auto; border-right:1px solid var(--border);
  }
  .pos-search {
    display:flex; align-items:center; gap:8px;
    background:var(--white); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:9px 14px; margin-bottom:16px;
  }
  .pos-search input { border:none; background:transparent; font-family:inherit; font-size:14px; outline:none; flex:1; }
  .pos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px; }
  .pos-item {
    background:var(--white); border:2px solid var(--border);
    border-radius:var(--radius); padding:12px; text-align:center;
    cursor:pointer; transition:var(--transition);
  }
  .pos-item:hover { border-color:var(--brand); background:var(--brand-light); transform:translateY(-1px); }
  .pos-item.in-cart { border-color:var(--brand); background:var(--brand-light); }
  .pos-item-emoji { font-size:32px; display:block; margin-bottom:6px; }
  .pos-item-name { font-size:12px; font-weight:700; color:var(--text); margin-bottom:3px; }
  .pos-item-price { font-size:13px; font-weight:800; color:var(--brand); font-family:'Space Grotesk',sans-serif; }

  .pos-cart { display:flex; flex-direction:column; background:var(--white); }
  .cart-header { padding:16px 20px; border-bottom:1px solid var(--border); }
  .cart-header h2 { font-size:16px; font-weight:800; }
  .cart-title-row { display:flex; align-items:center; justify-content:space-between; }
  .cart-count { background:var(--brand); color:#fff; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
  .cart-items { flex:1; overflow-y:auto; padding:12px; }
  .cart-item {
    display:flex; align-items:center; gap:10px;
    padding:10px; border-radius:var(--radius-sm);
    border:1px solid var(--border); margin-bottom:8px;
    background:var(--surface);
  }
  .cart-item-emoji { font-size:22px; }
  .cart-item-info { flex:1; }
  .cart-item-name { font-size:13px; font-weight:600; }
  .cart-item-price { font-size:12px; color:var(--text3); }
  .qty-control { display:flex; align-items:center; gap:6px; }
  .qty-btn {
    width:26px; height:26px; border-radius:6px;
    border:1px solid var(--border); background:var(--white);
    font-size:14px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:var(--transition); color:var(--text);
  }
  .qty-btn:hover { background:var(--brand); color:#fff; border-color:var(--brand); }
  .qty-num { font-size:14px; font-weight:700; min-width:20px; text-align:center; font-family:'Space Grotesk',sans-serif; }

  .cart-footer { padding:16px 20px; border-top:1px solid var(--border); }
  .cart-row { display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; }
  .cart-row.total { font-size:16px; font-weight:800; font-family:'Space Grotesk',sans-serif; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
  .btn-pay {
    width:100%; padding:14px; border:none; border-radius:var(--radius-sm);
    background:linear-gradient(135deg,var(--brand),#3B82F6);
    color:#fff; font-family:inherit; font-size:16px; font-weight:800;
    cursor:pointer; margin-top:14px; transition:var(--transition);
    box-shadow:0 4px 16px rgba(26,86,219,.3);
  }
  .btn-pay:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(26,86,219,.4); }
  .btn-pay:disabled { background:#94A3B8; box-shadow:none; cursor:not-allowed; transform:none; }

  /* ========== FORMS ========== */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center;
    z-index:1000; opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal {
    background:var(--white); border-radius:16px; padding:28px;
    width:480px; max-width:90vw; max-height:85vh; overflow-y:auto;
    transform:translateY(16px); transition:transform .2s;
    box-shadow:var(--shadow-md);
  }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-title { font-size:18px; font-weight:800; margin-bottom:20px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .field input, .field select, .field textarea {
    width:100%; padding:10px 13px;
    border:1px solid var(--border); border-radius:var(--radius-sm);
    font-family:inherit; font-size:14px; color:var(--text);
    outline:none; transition:var(--transition);
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-light); }
  .field textarea { resize:vertical; min-height:80px; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }

  /* ========== TOASTS ========== */
  .toast-wrap { position:fixed; bottom:24px; right:24px; z-index:9998; display:flex; flex-direction:column; gap:8px; }
  .toast {
    padding:12px 18px; border-radius:var(--radius-sm);
    background:var(--text); color:#fff; font-size:13px; font-weight:600;
    box-shadow:var(--shadow-md); transform:translateX(120%);
    transition:transform .3s ease; min-width:220px;
  }
  .toast.show { transform:translateX(0); }
  .toast.success { background:var(--accent2); }
  .toast.error { background:var(--danger); }
  .toast.warning { background:var(--accent); color:var(--text); }

  /* ========== MISC ========== */
  .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .page-header h2 { font-size:20px; font-weight:800; }
  .page-header p { font-size:13px; color:var(--text3); margin-top:2px; }
  .divider { height:1px; background:var(--border); margin:20px 0; }
  .empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
  .empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
  .empty-state p { font-size:14px; }

  .tag { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:600; }
  .tag-blue { background:var(--brand-light); color:var(--brand); }
  .tag-green { background:#D1FAE5; color:#065F46; }
  .tag-red { background:#FEE2E2; color:#991B1B; }

  /* ========== RECEIPT MODAL ========== */
  .receipt {

    border-radius:var(--radius-sm);
    padding:20px;
    background:var(--surface);
    margin:16px 0;
  }
  .receipt-header { text-align:center; margin-bottom:16px; }
  .receipt-header h3 { font-size:16px; font-weight:800; }
  .receipt-header p { font-size:11px; color:var(--text3); }
  .receipt-divider { border:none; border-top:1px dashed var(--border); margin:12px 0; }
  .receipt-row { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }

  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--text3); }

  /* ========== ANIMATIONS ========== */
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
  .view.active { animation:fadeIn .2s ease; }

  .skeleton {
    background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);
    background-size:200% 100%;
    animation:shimmer 1.5s infinite;
    border-radius:6px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .toggle-switch {
    position:relative; width:42px; height:24px; display:inline-block;
  }
  .toggle-switch input { opacity:0; width:0; height:0; }
  .toggle-slider {
    position:absolute; inset:0; background:#CBD5E1; border-radius:24px;

  }
  .toggle-slider::before {
    content:''; position:absolute;
    width:18px; height:18px; left:3px; top:3px;
    background:#fff; border-radius:50%; transition:.3s;
    box-shadow:0 1px 3px rgba(0,0,0,.2);
  }
  input:checked + .toggle-slider { background:var(--accent2); }
  input:checked + .toggle-slider::before { transform:translateX(18px); }

  @media(max-width:768px){

function filterPOS(q){
  const bizId = DB.currentUser.bizId;
  const products = DB.products.filter(p=>p.bizId===bizId && p.name.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('posGrid').innerHTML = products.map(p=>`
    <div class="pos-item ${DB.cart.find(c=>c.id===p.id)?'in-cart':''}" id="posItem-${p.id}" onclick="addToCart(${p.id})">
      <span class="pos-item-emoji">${p.emoji}</span>
      <div class="pos-item-name">${p.name}</div>
      <div class="pos-item-price">${fmt(p.price)}</div>
    </div>
  `).join('');
}

function addToCart(id){
  const p = DB.products.find(x=>x.id===id);
  const existing = DB.cart.find(c=>c.id===id);
  if(existing){ existing.qty++; } else { DB.cart.push({...p, qty:1}); }
  document.querySelectorAll(`#posItem-${id}`).forEach(el=>el.classList.add('in-cart'));
  updateCart();
}

function changeQty(id, delta){
  const idx = DB.cart.findIndex(c=>c.id===id);
  if(idx===-1) return;
  DB.cart[idx].qty += delta;
  if(DB.cart[idx].qty <= 0){
    DB.cart.splice(idx,1);
    document.querySelectorAll(`#posItem-${id}`).forEach(el=>el.classList.remove('in-cart'));
  }
  updateCart();
}

function updateCart(){
  const cartItems = document.getElementById('cartItems');
  const cartCount = document.getElementById('cartCount');
  const cartSub = document.getElementById('cartSub');
  const cartTotal = document.getElementById('cartTotal');
  const btnPay = document.getElementById('btnPay');
  if(!cartItems) return;

  const total = DB.cart.reduce((s,c)=>s+c.price*c.qty,0);
  const count = DB.cart.reduce((s,c)=>s+c.qty,0);

  if(cartCount) cartCount.textContent = count;
  if(cartSub) cartSub.textContent = fmt(total);
  if(cartTotal) cartTotal.textContent = fmt(total);
  if(btnPay) btnPay.disabled = DB.cart.length===0;

  if(!cartItems) return;
  if(DB.cart.length===0){
    cartItems.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><p>Belum ada item dipilih</p></div>`;
    return;
  }
  cartItems.innerHTML = DB.cart.map(c=>`
    <div class="cart-item">
      <span class="cart-item-emoji">${c.emoji}</span>
      <div class="cart-item-info">
        <div class="cart-item-name">${c.name}</div>
        <div class="cart-item-price">${fmt(c.price)}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(${c.id},-1)">−</button>
        <span class="qty-num">${c.qty}</span>
        <button class="qty-btn" onclick="changeQty(${c.id},1)">+</button>
      </div>
    </div>
  `).join('');
}

function processPayment(){
  if(DB.cart.length===0) return;
  const biz = DB.businesses.find(b=>b.id===DB.currentUser.bizId);
  const customer = document.getElementById('custName')?.value.trim() || 'Pelanggan';
  const total = DB.cart.reduce((s,c)=>s+c.price*c.qty,0);
  const items = DB.cart.map(c=>({name:c.name, qty:c.qty, price:c.price}));
  const txId = DB.nextTxId++;
  const tx = { id:txId, bizId:DB.currentUser.bizId, date:'2025-04-18', customer, items, total, kasir:DB.currentUser.name, status:'lunas' };
  DB.transactions.push(tx);
  biz.transactions++;
  biz.revenue += total;

  // Update or add customer
  let cust = DB.customers.find(c=>c.bizId===DB.currentUser.bizId && c.name===customer);
  if(cust){ cust.visits++; cust.total+=total; cust.lastVisit='18 Apr 2025'; }
  else if(customer!=='Pelanggan'){ DB.customers.push({id:DB.customers.length+1,bizId:DB.currentUser.bizId,name:customer,phone:'-',visits:1,total,lastVisit:'18 Apr 2025'}); }

  DB.cart = [];
  showReceipt(tx, biz);
}

function showReceipt(tx, biz){
  openModal(`
    <div class="modal-title" style="text-align:center">✅ Pembayaran Berhasil!</div>
    <div class="receipt">
      <div class="receipt-header">
        <h3>${biz.name}</h3>
        <p>Jagabisnis.id POS</p>
        <p>${tx.date} | TXN-00${tx.id}</p>
      </div>
      <hr class="receipt-divider">
      <div class="receipt-row" style="font-weight:700;font-size:11px"><span>PRODUK</span><span>SUBTOTAL</span></div>
      <hr class="receipt-divider">
      ${tx.items.map(it=>`<div class="receipt-row"><span>${it.name} ×${it.qty}</span><span>${fmt(it.price*it.qty)}</span></div>`).join('')}
      <hr class="receipt-divider">
      <div class="receipt-row receipt-total"><span>TOTAL</span><span>${fmt(tx.total)}</span></div>
      <div class="receipt-footer">Customer: ${tx.customer}</div>
      <div class="receipt-footer">Kasir: ${tx.kasir}</div>
      <div class="receipt-footer" style="margin-top:8px;font-size:13px">Terima kasih! 🙏</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal();renderPOS()">🖨️ Cetak Struk</button>
      <button class="btn btn-primary" onclick="closeModal();renderPOS()">✅ Transaksi Baru</button>
    </div>
  `);
}

function renderKasirHistory(){
  const txs = DB.transactions.filter(t=>t.bizId===DB.currentUser.bizId && t.kasir===DB.currentUser.name);
  const total = txs.reduce((s,t)=>s+t.total,0);
  document.getElementById('mainContent').innerHTML = `
    <div class="page-header"><div><h2>Riwayat Hari Ini</h2><p>Total: <strong style="color:var(--brand);font-family:Space Grotesk">${fmt(total)}</strong></p></div></div>
    <div class="table-card">
      <table>
        <thead><tr><th>#</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Detail</th></tr></thead>
        <tbody>
          ${txs.length===0?`<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:40px">Belum ada transaksi hari ini</td></tr>`:
          txs.map(t=>`<tr>
            <td><code>TXN-00${t.id}</code></td>
            <td>${t.customer}</td>
            <td>${t.items.length} item</td>
            <td><strong style="font-family:Space Grotesk">${fmt(t.total)}</strong></td>
            <td><span class="badge badge-green">${t.status}</span></td>
            <td><button class="btn btn-outline btn-sm" onclick="showTxDetail(${t.id})">🧾</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ===========================
//  MODAL HELPERS
// ===========================
function openModal(html){
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){
  if(e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

// ===========================
//  TOAST
// ===========================
function toast(msg, type=''){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  const icons = { success:'✅ ', error:'❌ ', warning:'⚠️ ' };
  el.textContent = (icons[type]||'ℹ️ ') + msg;
  wrap.appendChild(el);
  setTimeout(()=>el.classList.add('show'), 10);
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),300); }, 3000);
}

// ===========================
//  KEYBOARD
// ===========================
document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter' && document.getElementById('splash').style.display!=='none' && !document.getElementById('splash').classList.contains('out')) doLogin();
});
</script>
